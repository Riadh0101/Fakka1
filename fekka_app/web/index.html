<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fekka - Card Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        .app-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .app-store {
            background: #000;
            color: #fff;
        }
        .play-store {
            background: #fff;
            color: #1a1a2e;
        }
        .room-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(233,69,96,0.15);
            border: 1px solid rgba(233,69,96,0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #e94560;
        }
        .room-id {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 3px;
        }
        .open-app-btn {
            display: none;
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .open-app-btn:hover { transform: scale(1.03); }
        @media (max-width: 480px) {
            .logo { font-size: 3rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="logo">Fekka</div>
    <div class="subtitle">Schkobba 40 &mdash; Multiplayer Card Game</div>

    <div class="card" id="main-card">
        <p>Play the classic Tunisian card game with friends!</p>
        <div class="app-links">
            <a class="store-btn app-store" href="https://apps.apple.com/app/fekka/id0000000000" target="_blank">
                App Store
            </a>
            <a class="store-btn play-store" href="https://play.google.com/store/apps/details?id=com.fekka.game" target="_blank">
                Google Play
            </a>
        </div>
        <div class="room-info" id="room-info" style="display:none;">
            <p>You've been invited to a game!</p>
            <div class="room-id" id="room-id-display"></div>
        </div>
        <button class="open-app-btn" id="open-app-btn" onclick="openApp()">
            Open in Fekka App
        </button>
    </div>

    <script>
        (function() {
            const path = window.location.pathname;
            const match = path.match(/^\/join\/([A-Za-z0-9]+)$/);

            if (match) {
                const roomId = match[1];
                document.getElementById('room-info').style.display = 'block';
                document.getElementById('room-id-display').textContent = roomId;
            }

            var ua = navigator.userAgent;
            var isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

            if (isMobile) {
                document.getElementById('open-app-btn').style.display = 'inline-block';
            }
        })();

        function openApp() {
            var currentUrl = window.location.href;
            var appScheme = currentUrl.replace('https://', 'fekka://').replace('http://', 'fekka://');

            window.location.href = appScheme;

            setTimeout(function() {
                var isAndroid = /Android/i.test(navigator.userAgent);
                var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isAndroid) {
                    window.location.href = 'https://play.google.com/store/apps/details?id=com.fekka.game';
                } else if (isIOS) {
                    window.location.href = 'https://apps.apple.com/app/fekka/id0000000000';
                }
            }, 800);
        }
    </script>
</body>
</html>
